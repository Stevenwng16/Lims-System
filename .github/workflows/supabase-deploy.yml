name: Deploy Supabase

on:
  push:
    branches: [master]
    paths: ["lims-supabase/supabase/**", ".github/workflows/supabase-deploy.yml"]
  pull_request:
    paths: ["lims-supabase/supabase/**"]
  workflow_dispatch:

defaults:
  run:
    working-directory: lims-supabase

jobs:
  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # env(...) references resolved by `supabase config push`:
      SITE_URL: ${{ vars.SITE_URL }}
      RESET_REDIRECT_URL: ${{ vars.RESET_REDIRECT_URL }}
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_USER: ${{ vars.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_ADMIN_EMAIL: ${{ vars.SMTP_ADMIN_EMAIL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Push database migrations
        run: supabase db push

      - name: Push auth configuration
        run: supabase config push --yes

  # PR check: replay all migrations against a clean local database
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase and apply migrations
        run: |
          export SITE_URL=http://localhost:3000
          export RESET_REDIRECT_URL=http://localhost:3000/reset-password
          export SMTP_HOST=localhost SMTP_USER=x SMTP_PASS=x SMTP_ADMIN_EMAIL=x@x.dev
          supabase db start
